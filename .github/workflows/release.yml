name: Release LifeOS

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Package all language vaults
        run: |
          mkdir -p dist build

          EN_NAME=$(node -e "
            const m = require('./i18n/manifest.json');
            console.log(m.languages.en.archiveName || 'LifeOS');
          ")
          echo "Packaging en -> ${EN_NAME}.zip"
          mkdir -p "build/${EN_NAME}"
          rsync -a \
            --exclude 'i18n' \
            --exclude 'scripts' \
            --exclude '.github' \
            --exclude '.git' \
            --exclude 'dist' \
            --exclude 'build' \
            --exclude 'node_modules' \
            ./ "build/${EN_NAME}/"
          (cd build && zip -r "../dist/${EN_NAME}.zip" "${EN_NAME}" >/dev/null)

          LANGS=$(node -e "
            const m = require('./i18n/manifest.json');
            console.log(Object.keys(m.languages).filter(l => l !== 'en').join(' '));
          ")

          for lang in $LANGS; do
            ARCHIVE_NAME=$(node -e "
              const m = require('./i18n/manifest.json');
              console.log(m.languages['${lang}'].archiveName || 'LifeOS_${lang}');
            ")
            SRC="i18n/${lang}"
            if [ ! -d "$SRC" ]; then
              echo "Skipping ${lang}: ${SRC} does not exist"
              continue
            fi
            echo "Packaging ${lang} -> ${ARCHIVE_NAME}.zip"
            mkdir -p "build/${ARCHIVE_NAME}"
            # If the language dir already has .obsidian/ (e.g. legacy zh), use it as-is.
            # Otherwise, copy root .obsidian/ to provide full vault config.
            if [ ! -d "$SRC/.obsidian" ]; then
              rsync -a .obsidian "build/${ARCHIVE_NAME}/"
            fi
            rsync -a "$SRC/" "build/${ARCHIVE_NAME}/"
            (cd build && zip -r "../dist/${ARCHIVE_NAME}.zip" "${ARCHIVE_NAME}" >/dev/null)
          done

          echo "Generated archives:"
          ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.zip
